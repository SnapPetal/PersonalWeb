name: PersonalWeb Release

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BP_JVM_VERSION: 25
  IMAGE_NAME: "personal"
  ECR_REGISTRY: "public.ecr.aws/p0w8z2j2"
  ECR_REPOSITORY: "personal"

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '25'
          cache: 'maven'

      - name: Free disk space
        run: |
          docker system prune -af
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc

      - name: Pull buildpack builder image
        run: docker pull paketobuildpacks/builder-jammy-full

      - name: Build container image
        run: |
          mvn spring-boot:build-image \
            -Dspring-boot.build-image.imageName=${{ env.IMAGE_NAME }}
        env:
          BP_JVM_VERSION: ${{ env.BP_JVM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1
          role-session-name: personalweb-github-actions

      - name: Log in to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin public.ecr.aws

      - name: Tag and push container image
        run: |
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

  deploy-personalweb:
    name: Deploy PersonalWeb
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Package static site
        run: |
          tar -czf personal-static.tgz \
            -C static-site . \
            -C ../src/main/resources/static images/profile.png images/favicon.svg

      - name: Upload static site archive
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: personal-static.tgz
          target: /tmp

      - name: Publish static site
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            sudo install -d -o $USER -g $USER /var/www/thonbecker-static
            tar -xzf /tmp/personal-static.tgz -C /var/www/thonbecker-static
            rm -f /tmp/personal-static.tgz

      - name: Roll out PersonalWeb container
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ~/nextcloud-aws
            ./scripts/sync-personalweb-openai-secret.sh
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            docker compose up -d --no-deps personal-website

            attempts=0
            until curl -fsS http://127.0.0.1:3003/actuator/health >/dev/null; do
              attempts=$((attempts + 1))
              if [ "$attempts" -ge 40 ]; then
                docker logs personal-website --tail 100
                exit 1
              fi
              sleep 3
            done

            curl --fail --silent --show-error --resolve thonbecker.biz:443:127.0.0.1 https://thonbecker.biz/ >/dev/null
            curl --fail --silent --show-error --resolve app.thonbecker.biz:443:127.0.0.1 https://app.thonbecker.biz/landscape >/dev/null
            curl --fail --silent --show-error --resolve booking.thonbecker.biz:443:127.0.0.1 https://booking.thonbecker.biz/booking >/dev/null
