name: Build and Push to ECR

on:
  push:
    branches:
      - main

env:
  BP_JVM_VERSION: 25
  IMAGE_NAME: "personal"
  ECR_REPOSITORY: "personal"
  AWS_REGION: "us-east-1"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '25'
          cache: 'maven'

      - name: Free disk space
        run: |
          docker system prune -af
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc

      - name: Pull builder image
        run: docker pull paketobuildpacks/builder-jammy-full

      - name: Build Docker Image
        run: |
          mvn spring-boot:build-image \
            -Dspring-boot.build-image.imageName=${{ env.IMAGE_NAME }}
        env:
          BP_JVM_VERSION: ${{ env.BP_JVM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag ${{ env.IMAGE_NAME }}:latest $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker tag ${{ env.IMAGE_NAME }}:latest $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
