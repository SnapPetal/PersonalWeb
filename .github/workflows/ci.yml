name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '25'
          cache: 'maven'

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: design-system/package-lock.json

      - name: Lint design-system frontend
        working-directory: design-system
        run: npm ci && npm run lint

      - name: Build design-system WebJar
        run: mvn -B -f design-system/pom.xml install -DskipTests

      - name: Run verification build
        run: mvn -B verify
