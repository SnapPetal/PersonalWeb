name: PersonalWeb CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '25'
          cache: 'maven'

      - name: Build design-system WebJar
        run: mvn -B -f design-system/pom.xml install -DskipTests

      - name: Run Maven verification
        run: mvn -B verify
