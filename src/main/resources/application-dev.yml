spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dbmaster
    username: dbmasteruser
    password:

  liquibase:
    url: jdbc:postgresql://localhost:5432/dbmaster
    user: dbmasteruser
    password:

  security:
    oauth2:
      client:
        registration:
          cognito:
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  # DevTools configuration for hot reload
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/resources
    livereload:
      enabled: true

notification:
  email:
    enabled: false

calendar:
  nextcloud:
    enabled: false
