management:
  endpoints:
    web:
      exposure:
        include: health,modulith

server:
  forward-headers-strategy: framework

spring:
  application:
    name: "personal"
  config:
    import: optional:file:.env[.properties]
  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: ${SKATETRICKS_UPLOAD_MAX_FILE_SIZE:500MB}
      max-request-size: ${SKATETRICKS_UPLOAD_MAX_REQUEST_SIZE:500MB}

  # Thymeleaf Configuration
  thymeleaf:
    cache: false

  # Static Resource Versioning (cache-busting)
  web:
    resources:
      chain:
        strategy:
          content:
            enabled: true
            paths: /js/**,/css/**

  # Database Configuration
  datasource:
    url: jdbc:postgresql://ls-d58c718c47b3e4713b1e40ba54194bc87f99e527.cmldxjsfqvn4.us-east-1.rds.amazonaws.com:5432/dbmaster
    username: ${PERSONAL_DB_USERNAME}
    password: ${PERSONAL_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # Liquibase Configuration
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none  # Liquibase manages all schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # Spring AI OpenAI Configuration
  ai:
    openai:
      api-key: ${PERSONAL_OPENAI_API_KEY:${OPENAI_API_KEY:}}
      chat:
        model: ${PERSONAL_OPENAI_CHAT_MODEL:gpt-4o}
        max-tokens: 4096
      embedding:
        model: ${PERSONAL_OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
        dimensions: ${PERSONAL_OPENAI_EMBEDDING_DIMENSIONS:1024}
      image:
        model: ${PERSONAL_OPENAI_IMAGE_MODEL:dall-e-3}
        n: 1
        response_format: b64_json
        size: 1024x1024
    model:
      chat: openai
      embedding: openai
      image: openai

  # Task Execution (for WebSocket async operations)
  task:
    execution:
      pool:
        core-size: 8
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: websocket-task-

posthog:
  enabled: ${PERSONAL_POSTHOG_ENABLED:false}
  api-key: ${PERSONAL_POSTHOG_API_KEY:}
  api-host: ${PERSONAL_POSTHOG_API_HOST:https://us.i.posthog.com}

personal:
  admin:
    username: ${PERSONAL_ADMIN_USERNAME}
    password: ${PERSONAL_ADMIN_PASSWORD}

# Bible Verse API Configuration
bible:
  verse:
    api:
      url: https://bibleverse.thonbecker.com/
    cache:
      duration: 24

# Audio Storage Configuration (Dad Jokes)
audio:
  storage:
    bucket: cdn-page-stack-processedmediabucket446d3976-oonhpdwdpfzq
    cdn-domain: https://cdn.thonbecker.com

# Skatetricks Vector Store Configuration
skatetricks:
  upload:
    max-file-size: ${SKATETRICKS_UPLOAD_MAX_FILE_SIZE:500MB}
    presign-duration: ${SKATETRICKS_UPLOAD_PRESIGN_DURATION:15m}
  knowledge:
    enabled: ${SKATETRICKS_KNOWLEDGE_ENABLED:true}
    catalog-resource: ${SKATETRICKS_KNOWLEDGE_CATALOG_RESOURCE:classpath:skatetricks/trick-catalog.yml}
  analysis:
    max-frames: ${SKATETRICKS_ANALYSIS_MAX_FRAMES:24}
  transcoding:
    input-bucket: ${SKATETRICKS_TRANSCODING_INPUT_BUCKET:cdn-page-stack-processedmediabucket446d3976-oonhpdwdpfzq}
    output-bucket: ${SKATETRICKS_TRANSCODING_OUTPUT_BUCKET:cdn-page-stack-processedmediabucket446d3976-oonhpdwdpfzq}
    mediaconvert-role-arn: ${SKATETRICKS_MEDIACONVERT_ROLE_ARN:}
    endpoint: ${SKATETRICKS_MEDIACONVERT_ENDPOINT:}
    input-prefix: skatetricks/input/
    output-prefix: skatetricks/output/
    cdn-domain: ${SKATETRICKS_CDN_DOMAIN:https://cdn.thonbecker.com}
    poll-interval: 5s
    timeout: 5m
  vectorstore:
    bucket: thonbecker-vectors
    index: skatetricks-tricks
    dimension: 1024
    recreate: true

# Landscape Planning Configuration
landscape:
  plant-api:
    base-url: https://perenual.com/api/v2
    key: ${PERSONAL_PERENUAL_API_KEY}
    timeout: 10000
  storage:
    bucket: cdn-page-stack-processedmediabucket446d3976-oonhpdwdpfzq
    cdn-domain: https://cdn.thonbecker.com
    folder-prefix: landscape-plans/
  image-generation:
    responses-model: ${PERSONAL_OPENAI_IMAGE_RESPONSES_MODEL:gpt-4.1-mini}

# Notification Configuration (email only)
notification:
  email:
    enabled: true
    sender: verify@mail.thonbecker.biz
    admin: verify@mail.thonbecker.biz

# Calendar Integration (Nextcloud CalDAV)
calendar:
  nextcloud:
    enabled: true
    base-url: https://cloud.thonbecker.biz
    username: ${PERSONAL_NEXTCLOUD_USERNAME}
    password: ${PERSONAL_NEXTCLOUD_APP_PASSWORD}
    calendar-name: bookings
    organizer-email: thon.becker@gmail.com
    sync-cron: "0 */5 * * * *"

# Spring Modulith Configuration
spring.modulith:
  events:
    # This application uses the JPA-backed event publication registry for
    # transactional listeners. Externalization to brokers is not used.
    completion-mode: update
    republish-outstanding-events-on-restart: true

    jdbc:
      use-legacy-structure: false
    jdbc-schema-initialization:
      enabled: false  # Liquibase owns the event_publication table schema.

  validation:
    enabled: true

  observability:
    enabled: true
