management:
  endpoints:
    web:
      exposure:
        include: health,modulith

server:
  forward-headers-strategy: framework

spring:
  application:
    name: "personal"
  # File Upload Configuration
  servlet:
    multipart:
      max-file-size: ${SKATETRICKS_UPLOAD_MAX_FILE_SIZE:500MB}
      max-request-size: ${SKATETRICKS_UPLOAD_MAX_REQUEST_SIZE:500MB}

  # Thymeleaf Configuration
  thymeleaf:
    cache: false

  # Static Resource Versioning (cache-busting)
  web:
    resources:
      chain:
        strategy:
          content:
            enabled: true
            paths: /js/**,/css/**

  # Database Configuration
  datasource:
    url: jdbc:postgresql://ls-d58c718c47b3e4713b1e40ba54194bc87f99e527.cmldxjsfqvn4.us-east-1.rds.amazonaws.com:5432/dbmaster
    username: ${PERSONAL_DB_USERNAME}
    password: ${PERSONAL_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # Liquibase Configuration
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none  # Liquibase manages all schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # Spring AI Bedrock Configuration
  ai:
    bedrock:
      converse:
        chat:
          enabled: true
          options:
            model: us.anthropic.claude-sonnet-4-6
            max-tokens: 4096
            temperature: 0.3
      titan:
        embedding:
          model: amazon.titan-embed-text-v2:0
          input-type: TEXT
      aws:
        region: ${PERSONAL_AWS_REGION:us-east-1}
        access-key: ${PERSONAL_AWS_ACCESS_KEY_ID}
        secret-key: ${PERSONAL_AWS_SECRET_ACCESS_KEY}
    model:
      embedding: bedrock-titan

  # Task Execution (for WebSocket async operations)
  task:
    execution:
      pool:
        core-size: 8
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: websocket-task-

  # OAuth2 / Cognito Configuration
  security:
    oauth2:
      client:
        registration:
          cognito:
            client-id: ${PERSONAL_COGNITO_CLIENT_ID}
            client-secret: ${PERSONAL_COGNITO_CLIENT_SECRET}
            scope: openid,profile,email
            client-name: AWS Cognito
            redirect-uri: https://thonbecker.biz/login/oauth2/code/cognito
        provider:
          cognito:
            issuer-uri: https://cognito-idp.${PERSONAL_AWS_REGION:us-east-1}.amazonaws.com/${PERSONAL_COGNITO_USER_POOL_ID}

# Bible Verse API Configuration
bible:
  verse:
    api:
      url: https://bibleverse.thonbecker.com/
    cache:
      duration: 24

# Audio Storage Configuration (Dad Jokes)
audio:
  storage:
    bucket: cdn-page-stack-processedmediabucket446d3976-oonhpdwdpfzq
    cdn-domain: https://cdn.thonbecker.com

# Skatetricks Vector Store Configuration
skatetricks:
  upload:
    max-file-size: ${SKATETRICKS_UPLOAD_MAX_FILE_SIZE:500MB}
    presign-duration: ${SKATETRICKS_UPLOAD_PRESIGN_DURATION:15m}
  transcoding:
    input-bucket: ${SKATETRICKS_TRANSCODING_INPUT_BUCKET:cdn-page-stack-processedmediabucket446d3976-oonhpdwdpfzq}
    output-bucket: ${SKATETRICKS_TRANSCODING_OUTPUT_BUCKET:cdn-page-stack-processedmediabucket446d3976-oonhpdwdpfzq}
    mediaconvert-role-arn: ${SKATETRICKS_MEDIACONVERT_ROLE_ARN:}
    endpoint: ${SKATETRICKS_MEDIACONVERT_ENDPOINT:}
    input-prefix: skatetricks/input/
    output-prefix: skatetricks/output/
    cdn-domain: ${SKATETRICKS_CDN_DOMAIN:https://cdn.thonbecker.com}
    poll-interval: 5s
    timeout: 5m
  vectorstore:
    bucket: thonbecker-vectors
    index: skatetricks-tricks
    dimension: 1024
    recreate: false

# Landscape Planning Configuration
landscape:
  plant-api:
    base-url: https://perenual.com/api/v2
    key: ${PERSONAL_PERENUAL_API_KEY}
    timeout: 10000
  storage:
    bucket: cdn-page-stack-processedmediabucket446d3976-oonhpdwdpfzq
    cdn-domain: https://cdn.thonbecker.com
    folder-prefix: landscape-plans/

# Notification Configuration (email only)
notification:
  email:
    enabled: true
    sender: thon.becker@gmail.com
    admin: thon.becker@gmail.com

# Calendar Integration (Nextcloud CalDAV)
calendar:
  nextcloud:
    enabled: true
    base-url: https://cloud.thonbecker.biz
    username: ${PERSONAL_NEXTCLOUD_USERNAME}
    password: ${PERSONAL_NEXTCLOUD_APP_PASSWORD}
    calendar-name: bookings
    organizer-email: thon.becker@gmail.com
    sync-cron: "0 */5 * * * *"

# Spring Modulith Configuration (2.0.1)
spring.modulith:
  # Event publication and handling
  events:
    # Event externalization (for publishing to message brokers)
    externalization:
      enabled: true  # Enable event publication registry
      serialized-execution: true  # NEW in 2.0: Serialize event execution for consistency

    # Event republication for failed events
    republish-outstanding-events-on-restart: true

    # JDBC-based event publication registry
    jdbc-schema-initialization:
      enabled: false  # Liquibase creates the event_publication table (see changeset 019)

  # NEW in 2.0: Startup validation
  validation:
    enabled: true  # Validate module structure at startup

  # NEW in 2.0: Module observability
  observability:
    enabled: true  # Enable module interaction logging and metrics
