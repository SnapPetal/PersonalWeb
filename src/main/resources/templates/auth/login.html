<!DOCTYPE html>
<html lang="en-US" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Sign in - Personal</title>
    <link rel="icon" th:href="@{/images/favicon.svg}" type="image/svg+xml">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
</head>
<body class="bg-light">
<main class="container py-5" style="max-width: 32rem;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="h3 mb-3">Sign in</h1>
            <p class="text-muted">Enter your email and we’ll send you a one-time link. The link expires in 15 minutes, and your session lasts one day.</p>
            <div class="alert alert-success" th:if="${param.sent}">If that email can sign in, a link is on its way.</div>
            <form method="post" th:action="@{/auth/request}">
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden">
                <label class="form-label" for="email">Email</label>
                <input autocomplete="email" class="form-control mb-3" id="email" name="email" required type="email">
                <button class="btn btn-primary w-100" type="submit">Email me a sign-in link</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
