<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navigation(page)" class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="https://thonbecker.biz">Thon Becker</a>
        <button aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation" class="navbar-toggler"
                data-bs-target="#navbarNav" data-bs-toggle="collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="https://thonbecker.biz">Home</a>
                </li>
                <li class="nav-item" th:if="${page == 'admin'}">
                    <a class="nav-link" th:href="@{/booking}">Public Booking Page</a>
                </li>
                <li class="nav-item" th:if="${page == 'admin'}">
                    <span class="nav-link">Administrator</span>
                </li>
                <li class="nav-item" th:if="${page == 'confirmation'}">
                    <a class="nav-link" th:href="@{/booking}">Book Another Meeting</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Time Slots Fragment -->
<div th:fragment="time-slots">
    <div th:if="${slots != null and !slots.isEmpty()}" class="d-grid gap-2">
        <button th:each="slot : ${slots}"
                type="button"
                class="btn btn-outline-primary time-slot-btn"
                onclick="selectTimeSlot(this)"
                th:attr="data-start-time=${slot.startTime()}"
                th:text="${#temporals.format(slot.startTime(), 'h:mm a')}">
            Time Slot
        </button>
    </div>
    <div th:if="${slots == null or slots.isEmpty()}" class="alert alert-info">
        <i class="bi bi-info-circle"></i>
        No available time slots for this date. Please select another date.
    </div>
    <div th:if="${error != null}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle"></i>
        <span th:text="${error}">Error message</span>
    </div>
</div>
</body>
</html>
