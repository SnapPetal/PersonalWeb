<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Book a Meeting - Thon Becker</title>

    <!-- JS dependencies -->
    <script th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
    <script defer th:src="@{/webjars/alpinejs/dist/cdn.min.js}"></script>

    <!-- CSS Dependencies -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <link th:href="@{/css/main.css}" rel="stylesheet">

    <!-- Apply saved theme preference -->
    <script>
        if (localStorage.getItem("darkMode") === "enabled") {
            document.documentElement.setAttribute("data-bs-theme", "dark");
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Thon Becker</a>
        <button class="navbar-toggler" data-bs-target="#navbarNav" data-bs-toggle="collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="py-5">
    <div class="container" x-data="bookingForm()">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <!-- Header -->
                <div class="text-center mb-5">
                    <h1 class="display-5 fw-bold">Book a Meeting</h1>
                    <p class="lead text-muted">Schedule a consultation to discuss your project or technical challenges</p>
                </div>

                <!-- Booking Types -->
                <div class="row g-4 mb-5">
                    <div th:each="type : ${bookingTypes}" class="col-md-4">
                        <div class="card h-100 border-primary">
                            <div class="card-header text-white" th:style="'background-color: ' + ${type.color}">
                                <h5 class="card-title mb-0" th:text="${type.name}">Meeting Type</h5>
                            </div>
                            <div class="card-body">
                                <p class="card-text" th:text="${type.description}">Description</p>
                                <div class="d-flex justify-content-between align-items-center mt-3">
                                    <span class="badge bg-secondary" th:text="${type.durationMinutes} + ' minutes'">Duration</span>
                                    <button class="btn btn-primary btn-sm"
                                            @click="selectBookingType($event.currentTarget)"
                                            th:attr="data-type-id=${type.id},data-type-name=${type.name}">
                                        Select <i class="bi bi-arrow-right"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Booking Form (Initially Hidden) -->
                <div x-show="showBookingForm" x-cloak x-ref="bookingForm">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">
                                <i class="bi bi-calendar-check"></i>
                                Complete Your Booking
                            </h5>
                        </div>
                        <div class="card-body">
                            <!-- Date Selection -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">Select Date</label>
                                <input type="date" class="form-control" x-ref="bookingDate"
                                       x-model="bookingDate"
                                       th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                                       @change="loadAvailableSlots()">
                            </div>

                            <!-- Time Slots -->
                            <div x-show="showTimeSlots" x-cloak class="mb-4">
                                <label class="form-label fw-bold">Select Time</label>
                                <div x-ref="timeSlots"></div>
                            </div>

                            <!-- Attendee Information -->
                            <div x-show="showAttendeeForm" x-cloak x-ref="attendeeForm">
                                <h6 class="mb-3">Your Information</h6>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="attendeeName" class="form-label">Name *</label>
                                        <input type="text" class="form-control" id="attendeeName"
                                               x-model="attendeeName" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="attendeeEmail" class="form-label">Email *</label>
                                        <input type="email" class="form-control" id="attendeeEmail"
                                               x-model="attendeeEmail" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="attendeePhone" class="form-label">Phone (Optional)</label>
                                        <input type="tel" class="form-control" id="attendeePhone"
                                               x-model="attendeePhone">
                                    </div>
                                    <div class="col-12">
                                        <label for="attendeeMessage" class="form-label">Message (Optional)</label>
                                        <textarea class="form-control" id="attendeeMessage" rows="3"
                                                  x-model="attendeeMessage"
                                                  placeholder="Tell me a bit about what you'd like to discuss..."></textarea>
                                    </div>
                                </div>

                                <div class="d-grid gap-2 mt-4">
                                    <button type="button" class="btn btn-success btn-lg" @click="submitBooking()">
                                        <i class="bi bi-check-circle"></i> Confirm Booking
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" @click="resetForm()">
                                        <i class="bi bi-arrow-left"></i> Start Over
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    function bookingForm() {
        return {
            selectedBookingTypeId: null,
            selectedBookingTypeName: null,
            selectedStartTime: null,
            bookingDate: '',
            attendeeName: '',
            attendeeEmail: '',
            attendeePhone: '',
            attendeeMessage: '',
            showBookingForm: false,
            showTimeSlots: false,
            showAttendeeForm: false,

            init() {
                window.selectTimeSlot = (button) => this.selectTimeSlot(button);
            },

            selectBookingType(button) {
                this.selectedBookingTypeId = button.getAttribute('data-type-id');
                this.selectedBookingTypeName = button.getAttribute('data-type-name');
                this.showBookingForm = true;
                this.$nextTick(() => {
                    this.$refs.bookingForm.scrollIntoView({ behavior: 'smooth' });
                });
            },

            loadAvailableSlots() {
                if (!this.bookingDate || !this.selectedBookingTypeId) return;

                this.showTimeSlots = true;
                this.$refs.timeSlots.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"></div></div>';

                fetch(`/booking/types/${this.selectedBookingTypeId}/slots?date=${this.bookingDate}`)
                    .then(response => response.text())
                    .then(html => {
                        this.$refs.timeSlots.innerHTML = html;
                    })
                    .catch(() => {
                        this.$refs.timeSlots.innerHTML = '<div class="alert alert-danger">Failed to load time slots</div>';
                    });
            },

            selectTimeSlot(button) {
                document.querySelectorAll('.time-slot-btn').forEach(btn => {
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-outline-primary');
                });

                button.classList.remove('btn-outline-primary');
                button.classList.add('btn-primary');

                this.selectedStartTime = button.getAttribute('data-start-time');
                this.showAttendeeForm = true;
                this.$nextTick(() => {
                    this.$refs.attendeeForm.scrollIntoView({ behavior: 'smooth' });
                });
            },

            submitBooking() {
                const name = this.attendeeName.trim();
                const email = this.attendeeEmail.trim();

                if (!name || !email) {
                    alert('Please fill in all required fields');
                    return;
                }

                if (!this.selectedStartTime) {
                    alert('Please select a time slot');
                    return;
                }

                const bookingData = {
                    bookingTypeId: parseInt(this.selectedBookingTypeId),
                    attendeeName: name,
                    attendeeEmail: email,
                    attendeePhone: this.attendeePhone.trim() || null,
                    startTime: this.selectedStartTime,
                    message: this.attendeeMessage.trim() || null
                };

                fetch('/booking/book', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-XSRF-TOKEN': this.getCsrfToken()
                    },
                    body: JSON.stringify(bookingData)
                })
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(text => {
                            console.error('Booking error:', response.status, text);
                            throw new Error('Booking failed: ' + response.status);
                        });
                    }
                    return response.json();
                })
                .then(booking => {
                    window.location.href = `/booking/confirmation/${booking.confirmationCode}`;
                })
                .catch(error => {
                    alert('Failed to create booking. Please try again.');
                    console.error(error);
                });
            },

            resetForm() {
                this.showBookingForm = false;
                this.showTimeSlots = false;
                this.showAttendeeForm = false;
                this.bookingDate = '';
                this.attendeeName = '';
                this.attendeeEmail = '';
                this.attendeePhone = '';
                this.attendeeMessage = '';
                this.selectedBookingTypeId = null;
                this.selectedBookingTypeName = null;
                this.selectedStartTime = null;
            },

            getCsrfToken() {
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    const [name, value] = cookie.trim().split('=');
                    if (name === 'XSRF-TOKEN') {
                        return decodeURIComponent(value);
                    }
                }
                return '';
            }
        };
    }
</script>

</body>
</html>
