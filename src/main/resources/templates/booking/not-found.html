<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Booking Not Found - Thon Becker</title>

    <!-- CSS Dependencies -->
    <th:block th:replace="~{fragments/assets :: bootstrapCss}"></th:block>
    <link th:href="@{/css/main.css}" rel="stylesheet">

    <script th:src="@{/webjars/personal-design-system/1.0.0/js/theme-toggle.js}"></script>
</head>
<body class="booking-page">
<!-- Navigation -->
<nav th:replace="~{booking/fragments :: navigation('not-found')}"></nav>

<!-- Main Content -->
<main class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 text-center">
                <i class="bi bi-search booking-not-found-icon text-muted"></i>
                <h1 class="display-5 fw-bold mt-3">Booking Not Found</h1>
                <p class="lead text-muted">
                    We couldn't find a booking with that confirmation code.
                </p>
                <div class="mt-4">
                    <a th:href="@{/booking}" class="btn btn-primary">
                        <i class="bi bi-calendar-plus"></i> Book a Meeting
                    </a>
                    <a href="https://thonbecker.biz" class="btn btn-outline-secondary">
                        <i class="bi bi-house"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
