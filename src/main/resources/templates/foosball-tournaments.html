<!DOCTYPE html>
<html lang="en-US" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Tournaments - Foosball - Thon Becker</title>

    <link rel="icon" th:href="@{/images/favicon.svg}" type="image/svg+xml">

    <!-- CSRF Token -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <!-- CSS Dependencies -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <link th:href="@{/css/htmx-indicators.css}" rel="stylesheet">
    <link th:href="@{/css/foosball.css}" rel="stylesheet">

    <!-- JS dependencies -->
    <script th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
    <script th:src="@{/webjars/personal-design-system/1.0.0/js/htmx-extensions.js}"></script>
    <script th:src="@{/webjars/personal-design-system/1.0.0/js/csrf-utils.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
</head>
<body class="foosball-page" hx-ext="loading-states, form-validation, error-handling">
    <!-- Header -->
    <div class="foosball-header py-3 border-bottom bg-light">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="mb-0">🏆 Tournaments</h4>
                    <small class="text-secondary">Single & Double Elimination Brackets</small>
                </div>
                <div>
                    <a th:href="@{/foosball}" class="btn btn-outline-secondary btn-sm me-2">
                        <i class="bi bi-arrow-left"></i> Back to Foosball
                    </a>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createTournamentModal">
                        <i class="bi bi-plus-circle"></i> Create Tournament
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="py-5">
        <div class="container">
            <!-- Alerts -->
            <div id="main-alerts"></div>

            <!-- Tournaments List -->
            <div class="card app-card">
                <div class="card-header app-card-header">
                    <h5 class="mb-0"><i class="bi bi-trophy"></i> All Tournaments</h5>
                </div>
                <div class="card-body">
                    <div id="tournaments-list"
                         hx-get="/foosball/tournaments/fragments/list"
                         hx-trigger="load"
                         hx-indicator="#tournaments-list"
                         hx-swap="innerHTML">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create Tournament Modal -->
    <div class="modal fade" id="createTournamentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Create New Tournament</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createTournamentForm">
                        <div class="mb-3">
                            <label for="tournamentName" class="form-label">Tournament Name</label>
                            <input type="text" class="form-control" id="tournamentName" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="tournamentDescription" class="form-label">Description (Optional)</label>
                            <textarea class="form-control" id="tournamentDescription" name="description" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="tournamentType" class="form-label">Tournament Type</label>
                            <select class="form-select" id="tournamentType" name="tournamentType" required>
                                <option value="SINGLE_ELIMINATION" selected>Single Elimination</option>
                                <option value="DOUBLE_ELIMINATION">Double Elimination</option>
                            </select>
                            <small class="form-text text-muted">
                                Single: One loss and you're out. Double: Losers get a second chance in loser's bracket.
                            </small>
                        </div>
                        <div class="mb-3">
                            <label for="maxParticipants" class="form-label">Max Participants (Optional)</label>
                            <input type="number" class="form-control" id="maxParticipants" name="maxParticipants" min="2">
                        </div>
                        <div class="mb-3">
                            <label for="createdBy" class="form-label">Created By</label>
                            <select class="form-select" id="createdBy" name="createdById" required>
                                <option value="">Select Player</option>
                                <option th:each="player : ${players}" th:value="${player.id}" th:text="${player.name}"></option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="createTournament()">Create</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function createTournament() {
            const form = document.getElementById('createTournamentForm');
            const formData = new FormData(form);

            const request = {
                name: formData.get('name'),
                description: formData.get('description'),
                tournamentType: formData.get('tournamentType') || 'SINGLE_ELIMINATION',
                maxParticipants: formData.get('maxParticipants') ? parseInt(formData.get('maxParticipants')) : null
            };

            const createdById = parseInt(formData.get('createdById'));

            try {
                const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

                const response = await fetch(`/api/tournaments?createdById=${createdById}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        [csrfHeader]: csrfToken
                    },
                    body: JSON.stringify(request)
                });

                if (response.ok) {
                    const tournament = await response.json();
                    bootstrap.Modal.getInstance(document.getElementById('createTournamentModal')).hide();
                    form.reset();

                    // Redirect to tournament detail page
                    window.location.href = `/foosball/tournaments/${tournament.id}`;
                } else {
                    alert('Failed to create tournament');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to create tournament');
            }
        }
    </script>
</body>
</html>
