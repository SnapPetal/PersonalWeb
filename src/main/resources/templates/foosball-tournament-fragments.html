<!DOCTYPE html>
<html lang="en-US" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tournamentList">
    <div th:if="${tournaments.isEmpty()}" class="text-center text-muted py-4">
        No tournaments yet. Create one to get started!
    </div>

    <div th:unless="${tournaments.isEmpty()}" class="tournament-list">
        <div th:each="tournament : ${tournaments}" class="card app-card mb-3">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h5 class="card-title" th:text="${tournament.name()}">Tournament name</h5>
                        <p th:if="${tournament.description() != null}"
                           class="text-muted"
                           th:text="${tournament.description()}">Tournament description</p>
                        <div class="d-flex gap-2 flex-wrap">
                            <span class="badge"
                                  th:classappend="${tournament.status().name() == 'DRAFT' ? ' bg-secondary' :
                                      tournament.status().name() == 'REGISTRATION_OPEN' ? ' bg-success' :
                                      tournament.status().name() == 'REGISTRATION_CLOSED' ? ' bg-warning text-dark' :
                                      tournament.status().name() == 'IN_PROGRESS' ? ' bg-primary' :
                                      tournament.status().name() == 'COMPLETED' ? ' bg-dark' : ' bg-danger'}"
                                  th:text="${tournament.status().name()}">DRAFT</span>
                            <span class="badge bg-secondary" th:text="${tournament.tournamentType().name()}">
                                SINGLE_ELIMINATION
                            </span>
                            <span class="badge bg-info text-dark">
                                <i class="bi bi-people"></i>
                                <span th:text="${tournament.activeRegistrationsCount()}">0</span> participants
                            </span>
                        </div>
                    </div>
                    <div>
                        <a th:href="@{'/foosball/tournaments/' + ${tournament.id()}}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-eye"></i> View
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
