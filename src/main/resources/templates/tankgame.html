<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Game - Thon Becker</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <link rel="stylesheet" th:href="@{/css/tankgame.css}">
</head>
<body class="tankgame-page">
<div class="game-container" x-data="tankGameApp()">
    <div class="text-center mb-4">
        <h1 class="text-white">
            <i class="bi bi-controller"></i>
            Tank Battle Arena
        </h1>
        <a href="https://thonbecker.biz" class="btn btn-light btn-sm">
            <i class="bi bi-house"></i> Back to Home
        </a>
    </div>

    <!-- Lobby Section -->
    <div x-show="inLobby" class="game-info lobby-section">
        <h3>Join Battle</h3>
        <div class="mb-3">
            <input type="text" x-model="playerName" @keypress.enter="joinGame()" class="form-control" placeholder="Enter your name" maxlength="20">
        </div>
        <button @click="joinGame()" class="btn btn-primary btn-lg">
            <i class="bi bi-play-circle"></i> Join Game
        </button>
        <div class="mt-3" :class="lobbyStatusClass">
            <template x-if="lobbyStatusIcon">
                <i :class="'bi ' + lobbyStatusIcon"></i>
            </template>
            <span x-text="lobbyStatusText"></span>
        </div>
    </div>

    <!-- Game Section -->
    <div x-show="!inLobby" x-cloak>
        <!-- Player Progression -->
        <div class="progression-panel">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <span class="level-badge">
                        <i class="bi bi-star-fill"></i> Level <span x-text="level"></span>
                    </span>
                </div>
                <div>
                    <i class="bi bi-coin"></i> <strong x-text="coins"></strong> Coins
                </div>
            </div>

            <div class="xp-bar-container">
                <div class="xp-bar-fill" :style="'width: ' + xpProgress + '%'"></div>
                <div class="xp-bar-text" x-text="xpText"></div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" x-text="statKills"></div>
                    <div class="stat-label">Kills</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" x-text="statDeaths"></div>
                    <div class="stat-label">Deaths</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" x-text="statWins"></div>
                    <div class="stat-label">Wins</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" x-text="statKD"></div>
                    <div class="stat-label">K/D</div>
                </div>
            </div>
        </div>

        <!-- Match Results -->
        <div x-show="showMatchResults" x-transition:enter="transition ease-out duration-500"
             x-transition:enter-start="opacity-0 -translate-y-5"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-300"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="match-results">
            <h4 class="text-center mb-3">
                <i class="bi bi-trophy-fill"></i> Match Complete!
            </h4>
            <div class="text-center mb-3">
                <h5 x-text="matchPlacement"></h5>
            </div>
            <div class="text-center">
                <span class="reward-badge">
                    <i class="bi bi-star-fill"></i> +<span x-text="matchXP"></span> XP
                </span>
                <span class="reward-badge">
                    <i class="bi bi-coin"></i> +<span x-text="matchCoins"></span> Coins
                </span>
            </div>
            <div x-show="leveledUp" class="text-center mt-3">
                <h4 class="text-success">
                    <i class="bi bi-arrow-up-circle-fill"></i> Level Up!
                </h4>
                <p>You are now level <strong x-text="newLevel"></strong>!</p>
            </div>
        </div>

        <div class="game-info">
            <div class="game-status" :class="gameStatusClass">
                <i class="bi" :class="gameStatusIcon"></i>
                <span x-text="gameStatusText"></span>
            </div>

            <button x-show="showPlayAgain" @click="playAgain()" class="btn btn-success btn-lg play-again-btn">
                <i class="bi bi-arrow-clockwise"></i> Play Again
            </button>

            <div class="player-list">
                <template x-for="tank in tanks" :key="tank.id">
                    <div class="player-card" :class="tank.alive ? 'alive' : 'dead'">
                        <div>
                            <span class="color-indicator" :style="'background-color: ' + tank.color"></span>
                            <strong x-text="tank.playerName + (tank.isMe ? ' (You)' : '')"></strong>
                        </div>
                        <small class="text-muted" x-text="'Kills: ' + tank.kills"></small>
                        <div class="health-bar">
                            <div class="health-fill" :style="'width: ' + tank.health + '%'"></div>
                        </div>
                        <small x-text="tank.health + '% HP'"></small>
                    </div>
                </template>
            </div>
        </div>

        <canvas id="gameCanvas" class="game-canvas" width="800" height="600"></canvas>

        <div class="controls-help">
            <h5><i class="bi bi-info-circle"></i> Controls</h5>
            <div class="row">
                <div class="col-md-6">
                    <strong>Movement:</strong> WASD or Arrow Keys<br>
                    <strong>Aim:</strong> Move Mouse
                </div>
                <div class="col-md-6">
                    <strong>Shoot:</strong> Left Click or Space<br>
                    <strong>Objective:</strong> Last tank standing wins!
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/sockjs-client/sockjs.min.js}"></script>
<script th:src="@{/webjars/stomp-websocket/stomp.min.js}"></script>
<script th:src="@{/js/tankgame.js}"></script>
<script defer th:src="@{/webjars/alpinejs/dist/cdn.min.js}"></script>
</body>
</html>
