<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Game - Thon Becker</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .game-canvas {
            border: 4px solid #333;
            background-color: #2d2d2d;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: block;
            margin: 20px auto;
            border-radius: 8px;
        }

        .game-info {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .player-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .player-card {
            flex: 1;
            min-width: 150px;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #ddd;
            background: white;
        }

        .player-card.alive {
            border-color: #28a745;
        }

        .player-card.dead {
            border-color: #dc3545;
            opacity: 0.6;
        }

        .health-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #28a745, #5cb85c);
            transition: width 0.3s ease;
        }

        .controls-help {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        .game-status {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .status-waiting {
            background: #ffc107;
            color: #333;
        }

        .status-playing {
            background: #28a745;
            color: white;
        }

        .status-finished {
            background: #dc3545;
            color: white;
        }

        .lobby-section {
            text-align: center;
        }

        .color-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            border: 2px solid #333;
        }

        .play-again-btn {
            margin-top: 15px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .progression-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .xp-bar-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            height: 24px;
            overflow: hidden;
            margin: 10px 0;
            position: relative;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffed4e);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .xp-bar-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.85rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .stat-item {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .match-results {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 3px solid #ffd700;
        }

        .reward-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #333;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin: 5px;
        }

        .level-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        [x-cloak] {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="game-container" x-data="tankGameApp()">
    <div class="text-center mb-4">
        <h1 class="text-white">
            <i class="bi bi-controller"></i>
            Tank Battle Arena
        </h1>
        <a href="/" class="btn btn-light btn-sm">
            <i class="bi bi-house"></i> Back to Home
        </a>
    </div>

    <!-- Lobby Section -->
    <div x-show="inLobby" class="game-info lobby-section">
        <h3>Join Battle</h3>
        <div class="mb-3">
            <input type="text" x-model="playerName" @keypress.enter="joinGame()" class="form-control" placeholder="Enter your name" maxlength="20">
        </div>
        <button @click="joinGame()" class="btn btn-primary btn-lg">
            <i class="bi bi-play-circle"></i> Join Game
        </button>
        <div class="mt-3" :class="lobbyStatusClass">
            <template x-if="lobbyStatusIcon">
                <i :class="'bi ' + lobbyStatusIcon"></i>
            </template>
            <span x-text="lobbyStatusText"></span>
        </div>
    </div>

    <!-- Game Section -->
    <div x-show="!inLobby" x-cloak>
        <!-- Player Progression -->
        <div class="progression-panel">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <span class="level-badge">
                        <i class="bi bi-star-fill"></i> Level <span x-text="level"></span>
                    </span>
                </div>
                <div>
                    <i class="bi bi-coin"></i> <strong x-text="coins"></strong> Coins
                </div>
            </div>

            <div class="xp-bar-container">
                <div class="xp-bar-fill" :style="'width: ' + xpProgress + '%'"></div>
                <div class="xp-bar-text" x-text="xpText"></div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" x-text="statKills"></div>
                    <div class="stat-label">Kills</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" x-text="statDeaths"></div>
                    <div class="stat-label">Deaths</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" x-text="statWins"></div>
                    <div class="stat-label">Wins</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" x-text="statKD"></div>
                    <div class="stat-label">K/D</div>
                </div>
            </div>
        </div>

        <!-- Match Results -->
        <div x-show="showMatchResults" x-transition:enter="transition ease-out duration-500"
             x-transition:enter-start="opacity-0 -translate-y-5"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-300"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="match-results">
            <h4 class="text-center mb-3">
                <i class="bi bi-trophy-fill"></i> Match Complete!
            </h4>
            <div class="text-center mb-3">
                <h5 x-text="matchPlacement"></h5>
            </div>
            <div class="text-center">
                <span class="reward-badge">
                    <i class="bi bi-star-fill"></i> +<span x-text="matchXP"></span> XP
                </span>
                <span class="reward-badge">
                    <i class="bi bi-coin"></i> +<span x-text="matchCoins"></span> Coins
                </span>
            </div>
            <div x-show="leveledUp" class="text-center mt-3">
                <h4 class="text-success">
                    <i class="bi bi-arrow-up-circle-fill"></i> Level Up!
                </h4>
                <p>You are now level <strong x-text="newLevel"></strong>!</p>
            </div>
        </div>

        <div class="game-info">
            <div class="game-status" :class="gameStatusClass">
                <i class="bi" :class="gameStatusIcon"></i>
                <span x-text="gameStatusText"></span>
            </div>

            <button x-show="showPlayAgain" @click="playAgain()" class="btn btn-success btn-lg play-again-btn">
                <i class="bi bi-arrow-clockwise"></i> Play Again
            </button>

            <div class="player-list">
                <template x-for="tank in tanks" :key="tank.id">
                    <div class="player-card" :class="tank.alive ? 'alive' : 'dead'">
                        <div>
                            <span class="color-indicator" :style="'background-color: ' + tank.color"></span>
                            <strong x-text="tank.playerName + (tank.isMe ? ' (You)' : '')"></strong>
                        </div>
                        <small class="text-muted" x-text="'Kills: ' + tank.kills"></small>
                        <div class="health-bar">
                            <div class="health-fill" :style="'width: ' + tank.health + '%'"></div>
                        </div>
                        <small x-text="tank.health + '% HP'"></small>
                    </div>
                </template>
            </div>
        </div>

        <canvas id="gameCanvas" class="game-canvas" width="800" height="600"></canvas>

        <div class="controls-help">
            <h5><i class="bi bi-info-circle"></i> Controls</h5>
            <div class="row">
                <div class="col-md-6">
                    <strong>Movement:</strong> WASD or Arrow Keys<br>
                    <strong>Aim:</strong> Move Mouse
                </div>
                <div class="col-md-6">
                    <strong>Shoot:</strong> Left Click or Space<br>
                    <strong>Objective:</strong> Last tank standing wins!
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/sockjs-client/sockjs.min.js}"></script>
<script th:src="@{/webjars/stomp-websocket/stomp.min.js}"></script>
<script th:src="@{/js/tankgame.js}"></script>
<script defer th:src="@{/webjars/alpinejs/dist/cdn.min.js}"></script>
</body>
</html>
